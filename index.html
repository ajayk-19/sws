<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SWS AI Document Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React, ReactDOM and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* Clean Light Theme Design System matching the SWS AI Document Hub visual theme */
      :root {
        --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        
        --bg-page: #f8fafc;
        --bg-card: #ffffff;
        --bg-alert: #eff6ff;
        --bg-lavender: #faf5ff;
        
        --border-color: #e2e8f0;
        --border-alert: #bfdbfe;
        --border-purple: #f3e8ff;
        
        /* Corporate Blues & Purples */
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-light: #dbeafe;
        --primary-text-alert: #1e40af;
        
        --purple: #7c3aed;
        --purple-text: #6b21a8;
        
        --success: #10b981;
        --success-light: #d1fae5;
        --error: #ef4444;
        --error-light: #fee2e2;
        --warning: #f59e0b;
        
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        
        --transition-smooth: all 0.2s ease-in-out;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-page);
        color: var(--text-primary);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* App Shell Layout */
      .app-layout {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }

      /* Navigation Header */
      .navbar {
        height: 64px;
        background-color: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        flex-shrink: 0;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .back-btn:hover {
        color: var(--text-primary);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-left: 16px;
        border-left: 1px solid var(--border-color);
      }

      .brand-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 16px;
        color: var(--text-primary);
      }

      .live-badge {
        background-color: var(--primary);
        color: #ffffff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .bell-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 6px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        transition: var(--transition-smooth);
      }

      .bell-btn:hover {
        background-color: var(--bg-page);
        color: var(--text-primary);
      }

      /* Tabs Navigation Bar */
      .tabs-bar {
        background-color: var(--bg-card);
        border-bottom: 1px solid var(--border-color);
        padding: 0 32px;
        display: flex;
        gap: 24px;
        flex-shrink: 0;
      }

      .tab-item {
        background: none;
        border: none;
        padding: 14px 4px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: var(--transition-smooth);
      }

      .tab-item:hover {
        color: var(--text-primary);
      }

      .tab-item.active {
        color: var(--primary);
      }

      .tab-item.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background-color: var(--primary);
        border-radius: 2px;
      }

      /* Content Area */
      .main-content {
        flex: 1;
        overflow-y: auto;
        padding: 32px;
      }

      .tab-pane {
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Blue Info Alert matching the screenshot */
      .alert-info {
        background-color: var(--bg-alert);
        border: 1px solid var(--border-alert);
        border-radius: 8px;
        padding: 16px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .alert-icon {
        color: var(--primary);
        flex-shrink: 0;
        margin-top: 2px;
      }

      .alert-text {
        font-size: 13px;
        line-height: 1.5;
        color: var(--primary-text-alert);
      }

      /* Dropzone area */
      .dropzone {
        background-color: var(--bg-card);
        border: 2px dashed #bfdbfe;
        border-radius: 12px;
        padding: 48px 32px;
        text-align: center;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        transition: var(--transition-smooth);
        box-shadow: var(--shadow-sm);
      }

      .dropzone:hover, .dropzone.drag-active {
        border-color: var(--primary);
        background-color: #eff6ff;
      }

      .dropzone-icon-container {
        background-color: var(--bg-page);
        border-radius: 8px;
        padding: 12px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-smooth);
      }

      .dropzone:hover .dropzone-icon-container {
        background-color: var(--primary-light);
        color: var(--primary);
      }

      .dropzone-title {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .dropzone-sub {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* Progress indicators inside dropzone */
      .uploading-list {
        width: 100%;
        max-width: 480px;
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .uploading-item {
        background-color: var(--bg-page);
        border-radius: 6px;
        padding: 10px 14px;
        border: 1px solid var(--border-color);
        text-align: left;
      }

      .uploading-header {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
      }

      .uploading-progress-bg {
        height: 6px;
        background-color: var(--border-color);
        border-radius: 3px;
        overflow: hidden;
      }

      .uploading-progress-fill {
        height: 100%;
        background-color: var(--primary);
        width: 0%;
        transition: width 0.3s ease;
      }

      /* Document Library */
      .library-section {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 8px;
      }

      .library-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .library-title {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .clear-btn {
        background: none;
        border: none;
        color: var(--error);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 4px;
        transition: var(--transition-smooth);
      }

      .clear-btn:hover {
        background-color: var(--error-light);
      }

      /* Library Card Empty State */
      .library-empty {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 48px 32px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-sm);
      }

      .library-empty-icon {
        color: var(--text-muted);
      }

      .library-empty-title {
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .library-empty-desc {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* Library files grid */
      .library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .library-item {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-smooth);
      }

      .library-item:hover {
        border-color: var(--primary);
        box-shadow: var(--shadow-md);
      }

      .library-item-icon {
        color: var(--primary);
        background-color: var(--primary-light);
        padding: 8px;
        border-radius: 6px;
        display: flex;
        align-items: center;
      }

      .library-item-details {
        flex: 1;
        min-width: 0;
      }

      .library-item-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .library-item-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* REDESIGNED AI ASSISTANT FULL VIEW (Matching Tab 2 Screenshot) */
      .assistant-pane-full {
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: calc(100vh - 160px);
        position: relative;
      }

      .chat-scroll-container {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Purple Alert Banner at Top of Chat */
      .ai-assistant-alert {
        background-color: var(--bg-lavender);
        border: 1px solid var(--border-purple);
        border-radius: 8px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--purple-text);
        flex-shrink: 0;
      }

      .ai-assistant-alert-icon {
        color: var(--purple);
        display: flex;
        align-items: center;
      }

      /* Message Boxes */
      .message-box {
        display: flex;
        width: 100%;
        gap: 16px;
        align-items: flex-start;
        animation: slideUp 0.25s ease-out;
      }

      .message-box.user {
        justify-content: flex-end;
      }

      .message-box.assistant {
        justify-content: flex-start;
      }

      .avatar-container {
        width: 32px;
        height: 32px;
        background-color: var(--primary);
        color: #ffffff;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .msg-container {
        max-width: 75%;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .msg-info {
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        gap: 6px;
        font-weight: 500;
      }
      
      .message-box.user .msg-info {
        justify-content: flex-end;
      }

      .msg-bubble {
        padding: 16px 20px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .message-box.assistant .msg-bubble {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-top-left-radius: 2px;
        box-shadow: var(--shadow-sm);
      }

      .message-box.user .msg-bubble {
        background: linear-gradient(135deg, var(--primary), var(--primary-hover));
        color: #ffffff;
        border-top-right-radius: 2px;
        box-shadow: var(--shadow-md);
      }

      /* Citations/References inside Bot Bubble */
      .citations {
        margin-top: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
        background-color: var(--bg-page);
      }

      .citations-toggle {
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        background-color: rgba(0, 0, 0, 0.02);
      }

      .citations-list {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-top: 1px solid var(--border-color);
      }

      .citation-card {
        font-size: 11px;
        color: var(--text-secondary);
        background-color: var(--bg-card);
        padding: 10px;
        border-radius: 6px;
        border-left: 3px solid var(--primary);
        line-height: 1.5;
      }

      .citation-meta {
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
      }

      /* Input bar Area at Bottom */
      .chat-footer-controls {
        background-color: var(--bg-page);
        padding-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex-shrink: 0;
      }

      /* Suggestions Grid */
      .suggestions-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .suggestions-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .suggestions-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .suggestion-pill {
        background-color: var(--bg-card);
        border: 1px solid #cbd5e1;
        border-radius: 9999px;
        padding: 8px 16px;
        font-size: 12px;
        color: var(--primary);
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition-smooth);
        user-select: none;
      }

      .suggestion-pill:hover {
        background-color: var(--primary-light);
        border-color: var(--primary);
      }

      /* Input Box pill */
      .chat-input-pill {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 9999px;
        padding: 6px 6px 6px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-smooth);
      }

      .chat-input-pill:focus-within {
        border-color: var(--primary);
        box-shadow: var(--shadow-md), 0 0 0 2px rgba(37, 99, 235, 0.1);
      }

      .chat-input-field {
        flex: 1;
        border: none;
        outline: none;
        font-family: var(--font-sans);
        font-size: 14px;
        color: var(--text-primary);
        background: none;
      }

      .chat-input-field::placeholder {
        color: var(--text-muted);
      }

      .chat-send-btn {
        background-color: var(--primary);
        color: #ffffff;
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: var(--transition-smooth);
      }

      .chat-send-btn:hover:not(:disabled) {
        background-color: var(--primary-hover);
        transform: scale(1.05);
      }

      .chat-send-btn:disabled {
        background-color: #cbd5e1;
        color: #94a3b8;
        cursor: not-allowed;
      }

      .chat-helper-subtext {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
      }

      /* API Key configuration link row */
      .key-row {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
      }

      .key-wrapper {
        position: relative;
        display: flex;
        width: 200px;
      }

      .key-field {
        width: 100%;
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 4px 28px 4px 8px;
        font-size: 11px;
        outline: none;
      }

      .key-toggle {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
      }

      /* Bouncing loading dots */
      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        background-color: var(--text-secondary);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite ease-in-out;
      }

      .typing-dot:nth-child(1) { animation-delay: 0s; }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typingBounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-6px); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // Inline SVG definitions
      const ArrowLeft = () => (

      const Sparkles = () => (

      const Bell = () => (

      const Upload = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>

      const Bot = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="10" x="3" y="11" rx="2" ry="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" x2="8" y1="16" y2="16"/><line x1="16" x2="16" y1="16" y2="16"/></svg>
      );
      const Info = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>
      );
      const UploadCloudBig = () => (
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m15 15-3-3-3 3"/></svg>
      );
      const LibraryFolder = () => (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
      );
      const LibraryFile = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
      );
      const Trash = () => (
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      );
      const Send = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      );
      const ChevronDown = () => (
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      );
      const ChevronUp = () => (
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
      );
      const Key = () => (
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 1.5 1.5M15.5 7.5 14 6"/></svg>
      );
      const Eye = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      );
      const EyeOff = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
      );
      const SparklesPurple = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      );

      // Suggestions matching screenshot 2
      const suggestions = [
        "What is the annual leave policy?",
        "How many sick leave days do I get?",
        "What is the notice period for resignation?",
        "What are the WFH guidelines?",
        "What health insurance benefits do we have?",
        "How does the performance review work?",
        "What tools does SWS AI use for communication?",
        "What is the IT password policy?"
      ];

      // App Component
      function App() {
        const [activeTab, setActiveTab] = useState('upload'); // upload | chat
        const [documents, setDocuments] = useState([]);
        const [uploadingFiles, setUploadingFiles] = useState([]); 
        
        // Chat states initialized with the default greeting matching screenshot 2
        const defaultGreeting = {
          role: 'assistant',
          content: "Hi! I'm the SWS AI company assistant. Ask me anything about our HR policies, leave, benefits, resignation process, WFH guidelines, or any other company policy.",
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          isGreeting: true
        };
        const [messages, setMessages] = useState([defaultGreeting]);
        const [chatInput, setChatInput] = useState('');
        const [isChatLoading, setIsChatLoading] = useState(false);
        const [dragActive, setDragActive] = useState(false);
        
        // API key states
        const [apiKey, setApiKey] = useState('');
        const [showApiKey, setShowApiKey] = useState(false);

        const chatScrollRef = useRef(null);

        // Fetch documents on load
        useEffect(() => {
          fetchDocuments();
        }, []);

        // Auto-scroll chat to bottom
        useEffect(() => {
          if (chatScrollRef.current) {
            chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
          }
        }, [messages, isChatLoading]);

        const fetchDocuments = async () => {
          try {
            const response = await fetch('/documents');
            if (response.ok) {
              const data = await response.json();
              setDocuments(data.documents || []);
            }
          } catch (error) {
            console.error('Failed to fetch documents:', error);
          }
        };

        const handleUpload = async (filesToUpload) => {
          if (filesToUpload.length === 0) return;
          
          const allowedExtensions = ['.pdf', '.docx', '.csv', '.xlsx'];
          const validFiles = Array.from(filesToUpload).filter(file => {
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            return allowedExtensions.includes(ext);
          });

          if (validFiles.length === 0) {
            alert("Only PDF, DOCX, CSV, and XLSX files are supported.");
            return;
          }

          const initialUploading = validFiles.map(f => ({ name: f.name, progress: 10 }));
          setUploadingFiles(prev => [...prev, ...initialUploading]);

          const formData = new FormData();
          validFiles.forEach(file => {
            formData.append('files', file);
          });

          const progressInterval = setInterval(() => {
            setUploadingFiles(prev => 
              prev.map(f => f.progress < 80 ? { ...f, progress: f.progress + 15 } : f)
            );
          }, 300);

          try {
            const response = await fetch('/upload', {
              method: 'POST',
              body: formData
            });

            clearInterval(progressInterval);

            if (response.ok) {
              setUploadingFiles(prev => prev.map(f => ({ ...f, progress: 100 })));
              setTimeout(() => {
                setUploadingFiles([]);
                fetchDocuments();
              }, 600);
            } else {
              const err = await response.json();
              alert(`Error uploading files: ${err.detail || 'Upload failed'}`);
              setUploadingFiles([]);
            }
          } catch (error) {
            clearInterval(progressInterval);
            console.error('Upload failed:', error);
            alert("Failed to connect to FastAPI backend server.");
            setUploadingFiles([]);
          }
        };

        const handleReset = async () => {
          if (!confirm("Are you sure you want to clear all documents from the library? This will delete the Chroma vector database.")) return;
          
          try {
            const response = await fetch('/documents/reset', { method: 'POST' });
            if (response.ok) {
              setDocuments([]);
              setMessages([defaultGreeting]);
            } else {
              alert("Failed to clear document library.");
            }
          } catch (error) {
            console.error('Reset error:', error);
            alert("Connection error occurred while clearing database.");
          }
        };

        const handleSendMessage = async (textToSend) => {
          const text = textToSend.trim();
          if (!text || isChatLoading) return;
          
          const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          setMessages(prev => [...prev, { role: 'user', content: text, timestamp }]);
          setChatInput('');
          setIsChatLoading(true);

          try {
            const headers = { 'Content-Type': 'application/json' };
            if (apiKey.trim()) {
              headers['x-groq-api-key'] = apiKey.trim();
            }

            const response = await fetch('/chat', {
              method: 'POST',
              headers,
              body: JSON.stringify({ question: text })
            });

            const respTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (response.ok) {
              const data = await response.json();
              setMessages(prev => [...prev, {
                role: 'assistant',
                content: data.answer,
                sources: data.sources,
                timestamp: respTime
              }]);
            } else {
              const errData = await response.json();
              setMessages(prev => [...prev, {
                role: 'assistant',
                content: `⚠️ Error: ${errData.detail || 'Could not process question.'}`,
                timestamp: respTime
              }]);
            }
          } catch (error) {
            console.error('Chat error:', error);
            setMessages(prev => [...prev, {
              role: 'assistant',
              content: '⚠️ Failed to connect to server backend. Verify FastAPI server status.',
              timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
          } finally {
            setIsChatLoading(false);
          }
        };

        const handleFormSubmit = (e) => {
          e.preventDefault();
          handleSendMessage(chatInput);
        };

        // Drag handlers
        const handleDrag = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (e.type === "dragenter" || e.type === "dragover") {
            setDragActive(true);
          } else if (e.type === "dragleave") {
            setDragActive(false);
          }
        };

        const handleDrop = (e) => {
          e.preventDefault();
          e.stopPropagation();
          setDragActive(false);
          if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            handleUpload(e.dataTransfer.files);
          }
        };

        // Citations accordion component
        const Citations = ({ sources }) => {
          const [open, setOpen] = useState(false);
          return (
            <div className="citations">
              <div className="citations-toggle" onClick={() => setOpen(!open)}>
                <span>References ({sources.length})</span>
                {open ? <ChevronUp /> : <ChevronDown />}
              </div>
              {open && (
                <div className="citations-list">
                  {sources.map((src, i) => (
                    <div className="citation-card" key={i}>
                      <div className="citation-meta">
                        <span>Chunk #{i + 1}</span>
                        {src.source && <span style={{fontWeight: 700}}>{src.source}</span>}
                      </div>
                      <p>{src.content}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        };

        return (
          <div className="app-layout">
            {/* Header navbar matching screenshot */}
            <header className="navbar">
              <div className="nav-left">
                <button className="back-btn" onClick={() => alert("Exiting Hub")}>
                  <ArrowLeft />
                  <span>Back</span>
                </button>
                <div className="brand">
                  <span className="brand-title">SWS AI Document Hub</span>
                  <span className="live-badge">Live Demo</span>
                </div>
              </div>
              <div className="nav-right">
                <button className="bell-btn" title="Notifications">
                  <Bell />
                </button>
              </div>
            </header>

            {/* Navigation tab bar */}
            <nav className="tabs-bar">
              <button 
                className={`tab-item ${activeTab === 'upload' ? 'active' : ''}`}
                onClick={() => setActiveTab('upload')}
              >
                <Upload />
                <span>Document Upload</span>
              </button>
              <button 
                className={`tab-item ${activeTab === 'chat' ? 'active' : ''}`}
                onClick={() => setActiveTab('chat')}
              >
                <Bot />
                <span>AI Assistant</span>
              </button>
            </nav>

            <main className="main-content">
              {activeTab === 'upload' ? (
                /* REDESIGNED DOCUMENT UPLOAD TAB */
                <div className="tab-pane">
                  <div className="alert-info">
                    <span className="alert-icon"><Info /></span>
                    <p className="alert-text">
                      <strong>Multi-Document Mode Enabled:</strong> Files uploaded here will be processed, chunked, and embedded into the local Chroma vector store. You can upload multiple documents simultaneously and discuss their accumulated content in the AI Assistant tab.
                    </p>
                  </div>

                  <div 
                    className={`dropzone ${dragActive ? 'drag-active' : ''}`}
                    onDragEnter={handleDrag}
                    onDragOver={handleDrag}
                    onDragLeave={handleDrag}
                    onDrop={handleDrop}
                    onClick={() => document.getElementById('multiple-file-input').click()}
                  >
                    <input 
                      type="file" 
                      id="multiple-file-input" 
                      style={{ display: 'none' }}
                      multiple
                      onChange={(e) => e.target.files && handleUpload(e.target.files)}
                      accept=".pdf,.docx,.csv,.xlsx"
                    />
                    <div className="dropzone-icon-container">
                      <UploadCloudBig />
                    </div>
                    <div className="dropzone-title">Drop files here or click to browse</div>
                    <div className="dropzone-sub">Supports PDF, DOCX, CSV, XLSX • Any size up to 20 MB</div>
                    
                    {uploadingFiles.length > 0 && (
                      <div className="uploading-list" onClick={(e) => e.stopPropagation()}>
                        {uploadingFiles.map((file, i) => (
                          <div className="uploading-item" key={i}>
                            <div className="uploading-header">
                              <span>{file.name}</span>
                              <span>{file.progress}%</span>
                            </div>
                            <div className="uploading-progress-bg">
                              <div className="uploading-progress-fill" style={{ width: `${file.progress}%` }}></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <section className="library-section">
                    <div className="library-header">
                      <h3 className="library-title">Document Library</h3>
                      {documents.length > 0 && (
                        <button className="clear-btn" onClick={handleReset}>
                          <Trash />
                          <span>Clear Library</span>
                        </button>
                      )}
                    </div>

                    {documents.length === 0 ? (
                      <div className="library-empty">
                        <span className="library-empty-icon"><LibraryFolder /></span>
                        <h4 className="library-empty-title">No documents yet</h4>
                        <p className="library-empty-desc">Upload files above — they'll appear here once complete</p>
                      </div>
                    ) : (
                      <div className="library-grid">
                        {documents.map((doc, idx) => (
                          <div className="library-item" key={idx}>
                            <span className="library-item-icon"><LibraryFile /></span>
                            <div className="library-item-details">
                              <div className="library-item-name" title={doc}>{doc}</div>
                              <div className="library-item-meta">Indexed for RAG querying</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </section>
                </div>
              ) : (
                /* REDESIGNED AI ASSISTANT VIEW (Matching Tab 2 Screenshot) */
                <div className="assistant-pane-full">
                  <div className="chat-scroll-container" ref={chatScrollRef}>
                    {/* Purple alert line at top of session */}
                    <div className="ai-assistant-alert">
                      <span className="ai-assistant-alert-icon"><SparklesPurple /></span>
                      <span>
                        Powered by Groq LLM + {documents.length} SWS AI company document{documents.length !== 1 ? 's' : ''}. Ask anything about company policies.
                      </span>
                    </div>

                    {/* Chat Bubble List */}
                    {messages.map((msg, i) => (
                      <div className={`message-box ${msg.role === 'user' ? 'user' : 'assistant'}`} key={i}>
                        {msg.role === 'assistant' && (
                          <div className="avatar-container">
                            <Bot />
                          </div>
                        )}
                        <div className="msg-container">
                          <div className="msg-info">
                            <span>{msg.role === 'user' ? 'You' : 'SWS AI Assistant'}</span>
                            <span>•</span>
                            <span>{msg.timestamp}</span>
                          </div>
                          <div className="msg-bubble">
                            {msg.content}
                            {msg.sources && msg.sources.length > 0 && (
                              <Citations sources={msg.sources} />
                            )}
                          </div>
                        </div>
                      </div>
                    ))}

                    {isChatLoading && (
                      <div className="message-box assistant">
                        <div className="avatar-container">
                          <Bot />
                        </div>
                        <div className="msg-container">
                          <div className="msg-bubble" style={{ padding: '12px 16px' }}>
                            <div className="typing-indicator">
                              <span className="typing-dot"></span>
                              <span className="typing-dot"></span>
                              <span className="typing-dot"></span>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Redesigned Bottom Input bar controls area */}
                  <div className="chat-footer-controls">
                    {/* Suggestions Section (Visible when no follow-ups are asked yet) */}
                    {messages.length <= 1 && (
                      <div className="suggestions-section">
                        <span className="suggestions-title">Try asking:</span>
                        <div className="suggestions-grid">
                          {suggestions.map((sug, idx) => (
                            <button 
                              key={idx} 
                              className="suggestion-pill"
                              onClick={() => handleSendMessage(sug)}
                            >
                              {sug}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Input pill */}
                    <form className="chat-input-pill" onSubmit={handleFormSubmit}>
                      <input 
                        type="text" 
                        className="chat-input-field" 
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        placeholder="Ask about policies, leave, benefits..."
                        disabled={isChatLoading || documents.length === 0}
                      />
                      <button 
                        type="submit" 
                        className="chat-send-btn"
                        disabled={isChatLoading || documents.length === 0 || !chatInput.trim()}
                        title="Send Question"
                      >
                        <Send />
                      </button>
                    </form>

                    {/* Subtext info */}
                    <div className="chat-helper-subtext">
                      Answers sourced from SWS AI company documents only - Press Enter to send
                    </div>

                    {/* Custom API Key override bar */}
                    <div className="key-row">
                      <span className="dropzone-hint" style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                        <Key /> Groq Key (Optional override):
                      </span>
                      <div className="key-wrapper">
                        <input 
                          type={showApiKey ? "text" : "password"} 
                          className="key-field"
                          placeholder="Paste custom gsk_... key"
                          value={apiKey}
                          onChange={(e) => setApiKey(e.target.value)}
                        />
                        <button 
                          type="button" 
                          className="key-toggle" 
                          onClick={() => setShowApiKey(!showApiKey)}
                        >
                          {showApiKey ? <EyeOff size={12} /> : <Eye size={12} />}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
